<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="/leaflet/leaflet.css" />
  <script src="/leaflet/leaflet.js"></script>
  <style>
    html, body {
      height: 100%; width: 100%; margin: 0; padding: 0;
      overflow: hidden; position: fixed; inset: 0;
    }
    #map {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #aad3df;
    }
    #status {
      position: absolute; top: 8px; left: 8px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px;
      border-radius: 6px; font: 11px sans-serif; max-width: 90%;
    }
    .leaflet-tile-pane img { opacity: 1 !important; visibility: visible !important; }
    .leaflet-popup-content {
      max-width: min(300px, 85vw);
      overflow-wrap: anywhere;
      word-break: break-word;
      font: 12px/1.4 sans-serif;
    }
    .report-popup .rp-desc {
      margin: 6px 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .report-popup .rp-meta { margin: 4px 0 0; color: #64748b; font-size: 11px; }
    .report-popup .rp-actions {
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e8f0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .report-popup .rp-label { margin: 0 0 2px; font-size: 11px; font-weight: 600; color: #64748b; }
    .report-popup button {
      width: 100%; border-radius: 6px; padding: 6px 8px; font-size: 11px; font-weight: 600;
      border: 1px solid #cbd5e1; background: #fff; cursor: pointer;
    }
    .report-popup .rp-severe { border-color: #E8401E; color: #E8401E; background: rgba(232,64,30,0.06); }
    .report-popup .rp-ok { border-color: #16a34a; color: #15803d; }
    .report-popup .rp-muted { border-color: #94a3b8; color: #64748b; }
    .report-popup .rp-error { margin: 6px 0 0; color: #E8401E; font-size: 11px; }
  </style>
</head>
<body>
  <div id="status">Carregando mapa…</div>
  <div id="map"></div>
  <script>
    const BRAZIL_BBOX = '-74,-34,-34,6';
    const params = new URLSearchParams(location.search);
    const days = params.get('days') || '1';
    const status = document.getElementById('status');
    const tileUrl = location.origin + '/api/tiles/{z}/{x}/{y}.png';

    const REPORT_COLORS = { low: '#2563eb', medium: '#7c3aed', high: '#9333ea' };

    let map = null;
    let firesLayer = null;
    let reportsLayer = null;
    let userLayer = null;
    let userRadiusLayer = null;
    let tileLayer = null;
    let tileErrors = 0;
    const reportMarkers = {};

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function reportRadius(severity) {
      if (severity === 'high') return 10;
      if (severity === 'medium') return 8;
      return 7;
    }

    function reportPopupHtml(r) {
      return (
        '<div class="report-popup" id="rp-' + r.id + '">' +
          '<b>Reporte comunidade</b>' +
          '<p class="rp-meta">Severidade: ' + escapeHtml(r.severity) + '</p>' +
          '<p class="rp-desc">' + escapeHtml(r.description || '') + '</p>' +
          '<p class="rp-meta">' + escapeHtml(r.createdAt) + '</p>' +
          '<div class="rp-actions">' +
            '<p class="rp-label">O que está acontecendo?</p>' +
            '<button type="button" class="rp-ok" data-feedback="controlled" data-id="' + r.id + '">Incêndio controlado</button>' +
            '<button type="button" class="rp-muted" data-feedback="false_alarm" data-id="' + r.id + '">Alarme falso</button>' +
            '<button type="button" class="rp-severe" data-feedback="severe" data-id="' + r.id + '">Incêndio grave</button>' +
          '</div>' +
        '</div>'
      );
    }

    function bindReportPopupHandlers(popup, marker, report) {
      popup.on('add', function() {
        const el = popup.getElement();
        if (!el) return;
        el.querySelectorAll('[data-feedback]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            submitReportFeedback(report.id, btn.getAttribute('data-feedback'), btn, marker);
          });
        });
      });
    }

    async function submitReportFeedback(id, feedback, btn, marker) {
      btn.disabled = true;
      btn.textContent = 'Enviando…';
      try {
        const res = await fetch('/api/reports/' + encodeURIComponent(id) + '/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ feedback: feedback }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.removed) {
          reportsLayer.removeLayer(marker);
          delete reportMarkers[id];
          map.closePopup();
          return;
        }
        if (data.report) {
          marker.setStyle({
            fillColor: REPORT_COLORS.high,
            radius: reportRadius('high'),
          });
          marker.setPopupContent(reportPopupHtml(data.report));
          bindReportPopupHandlers(marker.getPopup(), marker, data.report);
        }
      } catch (e) {
        const root = document.getElementById('rp-' + id);
        if (root) {
          const err = document.createElement('p');
          err.className = 'rp-error';
          err.textContent = 'Não foi possível registrar.';
          root.appendChild(err);
        }
        btn.disabled = false;
        btn.textContent = feedback === 'severe' ? 'Incêndio grave' :
          feedback === 'false_alarm' ? 'Alarme falso' : 'Incêndio controlado';
      }
    }

    function renderReports(reports) {
      reportsLayer.clearLayers();
      Object.keys(reportMarkers).forEach(function(k) { delete reportMarkers[k]; });
      reports.forEach(function(r) {
        const color = REPORT_COLORS[r.severity] || REPORT_COLORS.medium;
        const marker = L.circleMarker([r.latitude, r.longitude], {
          radius: reportRadius(r.severity),
          color: '#fff', fillColor: color, fillOpacity: 0.9, weight: 2, dashArray: '3 2'
        });
        const popup = L.popup({ maxWidth: 300, minWidth: 220 }).setContent(reportPopupHtml(r));
        marker.bindPopup(popup);
        bindReportPopupHandlers(popup, marker, r);
        marker.addTo(reportsLayer);
        reportMarkers[r.id] = marker;
      });
    }

    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: true, preferCanvas: false }).setView([-14.5, -52], 4);
      tileLayer = L.tileLayer(tileUrl, {
        maxZoom: 19,
        minZoom: 3,
        tileSize: 256,
        detectRetina: false,
        updateWhenIdle: false,
        keepBuffer: 2,
        attribution: '&copy; OpenStreetMap',
      });
      tileLayer.on('tileerror', function() {
        tileErrors++;
        if (tileErrors === 5) status.textContent = 'Erro tiles (' + tileErrors + ')';
      });
      tileLayer.addTo(map);
      firesLayer = L.layerGroup().addTo(map);
      reportsLayer = L.layerGroup().addTo(map);
      userLayer = L.layerGroup().addTo(map);
      userRadiusLayer = L.layerGroup().addTo(map);
      [50, 200, 500, 1200].forEach(function(ms) {
        setTimeout(function() { map.invalidateSize(true); if (tileLayer) tileLayer.redraw(); }, ms);
      });
    }

    function renderFires(fires) {
      firesLayer.clearLayers();
      const max = 800;
      const step = fires.length > max ? Math.ceil(fires.length / max) : 1;
      for (let i = 0; i < fires.length; i += step) {
        const f = fires[i];
        const color = f.confidence === 'low' ? '#F5C842' : (f.confidence === 'high' ? '#E8401E' : '#F4731E');
        L.circleMarker([f.latitude, f.longitude], {
          radius: 5, color: color, fillColor: color, fillOpacity: 0.85, weight: 1
        }).bindPopup('<b>Satélite</b><br>' + f.id + '<br>' + f.confidence).addTo(firesLayer);
      }
    }

    window.setUserLocation = function(lat, lon) {
      initMap();
      userLayer.clearLayers();
      userRadiusLayer.clearLayers();
      L.circle([lat, lon], {
        radius: 10000, color: '#2563eb', fillColor: '#2563eb', fillOpacity: 0.08, weight: 1, dashArray: '6 4'
      }).addTo(userRadiusLayer);
      L.circleMarker([lat, lon], {
        radius: 9, color: '#fff', fillColor: '#2563eb', fillOpacity: 1, weight: 3
      }).bindPopup('<b>Sua localização</b>').addTo(userLayer);
    };

    window.centerOnUser = function() {
      if (!map || !userLayer.getLayers().length) return;
      const ll = userLayer.getLayers()[0].getLatLng();
      map.setView(ll, Math.max(map.getZoom(), 10));
    };

    async function load() {
      try {
        initMap();
        const [firesRes, reportsRes] = await Promise.all([
          fetch('/api/fires?bbox=' + BRAZIL_BBOX + '&days=' + days),
          fetch('/api/reports?bbox=' + BRAZIL_BBOX).catch(function() { return null; }),
        ]);
        if (!firesRes.ok) throw new Error('fires HTTP ' + firesRes.status);
        const firesData = await firesRes.json();
        renderFires(firesData.hotspots || []);
        let reportCount = 0;
        if (reportsRes && reportsRes.ok) {
          const reports = await reportsRes.json();
          reportCount = reports.length;
          renderReports(reports);
        }
        status.textContent = (firesData.hotspots || []).length + ' focos · ' + reportCount + ' reportes · ' + days + 'd';
      } catch (e) {
        status.textContent = 'Erro: ' + e.message;
      }
    }

    load();
  </script>
</body>
</html>
